name: Android Build APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    name: Build Customer APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build Customer App (Next.js)
        run: |
          cd apps/customer
          npm run build

      - name: Capacitor Sync (Customer)
        run: |
          cd apps/customer
          npx cap sync android

      - name: Build Customer APK (Gradle)
        run: |
          cd apps/customer/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Provider App (Next.js)
        run: |
          cd apps/provider
          npm run build

      - name: Capacitor Sync (Provider)
        run: |
          cd apps/provider
          npx cap sync android

      - name: Build Provider APK (Gradle)
        run: |
          cd apps/provider/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Customer APK
        uses: actions/upload-artifact@v4
        with:
          name: QuickFix-Customer-App
          path: apps/customer/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Provider APK
        uses: actions/upload-artifact@v4
        with:
          name: QuickFix-Provider-App
          path: apps/provider/android/app/build/outputs/apk/debug/app-debug.apk
